version: 2

builds:
  - binary: lazyaws
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

brews:
  - name: lazyaws
    repository:
      owner: bkneis
      name: homebrew-lazyaws
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/bkneis/lazyaws"
    description: "Terminal UI for browsing AWS resources"
    license: MIT
    test: |
      system "#{bin}/lazyaws", "--version"
    install: |
      bin.install "lazyaws"

scoops:
  - name: lazyaws
    repository:
      owner: bkneis
      name: scoop-lazyaws
      token: "{{ .Env.SCOOP_BUCKET_TOKEN }}"
    directory: bucket
    homepage: "https://github.com/bkneis/lazyaws"
    description: "Terminal UI for browsing AWS resources"
    license: MIT

nfpms:
  - package_name: lazyaws
    homepage: "https://github.com/bkneis/lazyaws"
    maintainer: "bkneis <noreply@github.com>"
    description: "Terminal UI for browsing AWS resources"
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    contents:
      - src: LICENSE
        dst: /usr/share/doc/lazyaws/LICENSE

dockers:
  - image_templates:
      - "bkneis/lazyaws:{{ .Version }}-amd64"
      - "bkneis/lazyaws:latest-amd64"
    use: buildx
    goos: linux
    goarch: amd64
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/amd64"
  - image_templates:
      - "bkneis/lazyaws:{{ .Version }}-arm64"
      - "bkneis/lazyaws:latest-arm64"
    use: buildx
    goos: linux
    goarch: arm64
    dockerfile: Dockerfile
    build_flag_templates:
      - "--platform=linux/arm64"

docker_manifests:
  - name_template: "bkneis/lazyaws:{{ .Version }}"
    image_templates:
      - "bkneis/lazyaws:{{ .Version }}-amd64"
      - "bkneis/lazyaws:{{ .Version }}-arm64"
  - name_template: "bkneis/lazyaws:latest"
    image_templates:
      - "bkneis/lazyaws:latest-amd64"
      - "bkneis/lazyaws:latest-arm64"

